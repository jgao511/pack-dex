apply plugin: 'com.android.application'

def scannerAiPocEnabled = project.hasProperty('packdexScannerAiPoc') && project.property('packdexScannerAiPoc') == 'true'
def scannerAiWebMarker = file('src/main/assets/public/scanner-ai-build.json')
if (scannerAiPocEnabled != scannerAiWebMarker.exists()) {
    throw new GradleException(scannerAiPocEnabled
        ? 'Scanner-AI native build requested, but the synchronized web bundle is not scanner-AI. Run npm run build:scanner-ai:android.'
        : 'Scanner-AI web bundle detected in a normal Android build. Run npm --prefix mobile-app run cap:sync:android before building normally.')
}

android {
    namespace = "com.packdex.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        applicationId "com.packdex.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        // The WebView debug socket is an isolated scanner-AI holdout aid. The
        // normal build compiles the same activity with this value set to false.
        buildConfigField "boolean", "PACKDEX_SCANNER_AI_POC", scannerAiPocEnabled ? "true" : "false"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        if (scannerAiPocEnabled) {
            // This isolated proof build targets the connected Pixel 6a. Keeping
            // only arm64 avoids packaging three unused copies of LiteRT/ML Kit.
            ndk { abiFilters 'arm64-v8a' }
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    if (scannerAiPocEnabled) {
        sourceSets {
            main {
                manifest.srcFile 'src/scannerAi/AndroidManifest.xml'
                java.srcDirs += 'src/scannerAi/java'
                assets.srcDirs += 'src/scannerAi/assets'
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    if (scannerAiPocEnabled) {
        // The isolated scanner-AI APK must never wait for a Play Services model
        // download. This artifact packages the Latin OCR model while bringing
        // in the shared recognizer API required by the Capacitor OCR bridge.
        implementation 'com.google.mlkit:text-recognition:16.0.1'
        implementation 'com.google.ai.edge.litert:litert:2.1.6'
    }
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
