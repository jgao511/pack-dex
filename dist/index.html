    <script>
      (() => {
        const path = window.location.pathname || "/";
        const lowerPath = path.toLowerCase();
        const isMobileRoute = lowerPath.startsWith("/mobile-app");
        const isAssetRoute =
          lowerPath.startsWith("/api/") ||
          lowerPath.startsWith("/assets/") ||
          lowerPath.startsWith("/set-logos/") ||
          lowerPath.endsWith(".png") ||
          lowerPath.endsWith(".jpg") ||
          lowerPath.endsWith(".jpeg") ||
          lowerPath.endsWith(".webp") ||
          lowerPath.endsWith(".svg") ||
          lowerPath.endsWith(".ico") ||
          lowerPath.endsWith(".json") ||
          lowerPath.endsWith(".webmanifest") ||
          lowerPath.endsWith(".css") ||
          lowerPath.endsWith(".js");
        const isAuthRoute =
          lowerPath.startsWith("/auth") ||
          lowerPath.includes("callback") ||
          window.location.search.includes("code=") ||
          window.location.hash.includes("access_token");
        const isMobileUserAgent = /Android|iPhone|iPod|IEMobile|Opera Mini/i.test(navigator.userAgent || "");
        const isPhoneWidth = window.matchMedia("(max-width: 760px) and (pointer: coarse)").matches;

        if (!isMobileRoute && !isAssetRoute && !isAuthRoute && (isMobileUserAgent || isPhoneWidth)) {
          window.location.replace(`/mobile-app/${window.location.search}${window.location.hash}`);
        }
      })();
    </script>
